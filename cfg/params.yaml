/**:
  ros__parameters:
    # VERY IMPORTANT: If using sim time, make sure to all --clock to your bag file playback
    # DLIO drifts sometimes when --clock is not used
    use_sim_time: false
    frames/odom: odom
    frames/baselink: base_link
    frames/lidar: os_lidar
    frames/imu: os_imu

    map/waitUntilMove: true
    map/dense/filtered: false
    map/sparse/leafSize: 0.25

    odom/gravity: 9.80665
    odom/computeTimeOffset: true

    odom/imu/approximateGravity: false
    odom/imu/calibration/gyro: true
    odom/imu/calibration/accel: true
    odom/imu/calibration/time: 3.0
    odom/imu/bufferSize: 5000

    # A box crop is taken of the original point cloud before any pre-processing
    # This is similar to the blind parameter to filter out point too close to the sensor
    odom/preprocessing/cropBoxFilter/size: 1.0
    # Input cloud downsampled to this resolution after box crop
    # Impacts memory usage (Default: 0.25)
    odom/preprocessing/voxelFilter/res: 0.75

    # Keyframe generating distance and rotation angle threshold
    # Default: 1.0m, 45 degrees
    # Outdoor environments: 6.0-8.0m
    # Indoor environments: 2.0-3.0m
    odom/keyframe/threshD: 6.0
    odom/keyframe/threshR: 45.0

    odom/submap/keyframe/knn: 10
    odom/submap/keyframe/kcv: 10
    odom/submap/keyframe/kcc: 10
    odom/gicp/minNumPoints: 64
    odom/gicp/kCorrespondences: 16
    odom/gicp/maxCorrespondenceDistance: 0.5
    odom/gicp/maxIterations: 32
    odom/gicp/transformationEpsilon: 0.01
    odom/gicp/rotationEpsilon: 0.01
    odom/gicp/initLambdaFactor: 0.000000001

    odom/geo/Kp: 4.5
    odom/geo/Kv: 11.25
    odom/geo/Kq: 4.0
    odom/geo/Kab: 2.25
    odom/geo/Kgb: 1.0
    odom/geo/abias_max: 5.0
    odom/geo/gbias_max: 0.5
